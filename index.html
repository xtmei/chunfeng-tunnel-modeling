<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>春风隧道"单洞双层"结构示意</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="hero-title">
        <h1>春风隧道"单洞双层"结构示意</h1>
        <p>深圳城市快速路地下交通工程科普动画</p>
      </header>

      <div id="scene-wrap">
        <canvas id="stage"></canvas>
        <div id="label-layer"></div>
        <div class="scene-caption" id="scene-caption"></div>
      </div>

      <div class="control-bar">
        <div class="top-controls">
          <div class="btn-group">
            <button id="prev">◀ 上一幕</button>
            <button id="play">⏸ 暂停</button>
            <button id="next">下一幕 ▶</button>
          </div>
          <label class="switch-wrap">
            <input type="checkbox" id="toggle-labels" checked />
            <span>标签</span>
          </label>
        </div>
        <div class="progress-wrap">
          <input id="progress" type="range" min="0" max="1" step="0.0001" value="0" />
        </div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="main.js"></script>
  </body>
</html>

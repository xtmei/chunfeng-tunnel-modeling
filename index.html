<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#081426" />
    <title>春风隧道“单洞双层”结构示意</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* 紧急修复：确保应用层撑满屏幕 */
      #app { position: fixed; inset: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="hero-title">
        <h1>春风隧道“单洞双层”结构示意</h1>
        <p>深圳城市快速路地下交通工程交互模型</p>
      </header>

      <div id="scene-wrap">
        <canvas id="stage"></canvas>
        <div id="label-layer"></div>
        <div class="scene-caption" id="scene-caption"></div>
      </div>

      <div class="control-bar">
        <div class="control-hint">拖拽旋转，滚轮或双指缩放查看结构</div>
        <div class="top-controls">
          <button id="reset-view" aria-label="恢复默认视角">复位视角</button>
          <label class="switch-wrap">
            <input type="checkbox" id="toggle-labels" checked aria-label="显示或隐藏结构标签" />
            <span>标签</span>
          </label>
        </div>
      </div>
    </div>

    <!-- 使用更稳定的 CDN -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="main.js"></script>
  </body>
</html>
